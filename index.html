<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Ompreng</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
  color: white;
  text-align: center;
}

body {
  background: linear-gradient(to bottom, red 50%, white 50%);
}

.overlay {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box {
  background: rgba(0,0,0,0.85);
  padding: 25px;
  border-radius: 16px;
  width: 320px;
}

input, button {
  padding: 10px;
  margin: 10px;
  width: 85%;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="box">
    <h2>KALKULATOR OMPRENG</h2>

    <input type="text" id="uang" placeholder="Masukkan uang (Rp)">
    <p id="terbilang"></p>

    <button onclick="hitung()">HITUNG</button>

    <h3 id="hasil"></h3>
    <h4 id="waktu"></h4>
  </div>
</div>

<script>
const harga = 10000;
const penduduk = 270000000;

/* FORMAT ANGKA */
function formatAngka(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

/* TERBILANG (CUMA UNTUK UANG & OMPRENG) */
function terbilang(num) {
  num = Number(num);

  if (num < 1000) return num + " perak";

  const satuan = [
    {nilai: 1e12, nama: "triliun"},
    {nilai: 1e9, nama: "miliar"},
    {nilai: 1e6, nama: "juta"},
    {nilai: 1e3, nama: "ribu"}
  ];

  for (let s of satuan) {
    if (num >= s.nilai) {
      return Math.floor(num / s.nilai) + " " + s.nama;
    }
  }
}

/* INPUT FORMAT */
document.getElementById("uang").addEventListener("input", function(e) {
  let val = e.target.value.replace(/\D/g, "");
  e.target.value = formatAngka(val);

  document.getElementById("terbilang").innerText =
    val ? "= " + terbilang(val) : "";
});

/* HITUNG */
function hitung() {
  let uang = document.getElementById("uang").value.replace(/\./g, "");
  if (!uang) return;

  let ompreng = Math.floor(uang / harga);
  let hari = ompreng / penduduk;

  let waktu;

  if (hari >= 1) {
    let totalHari = Math.floor(hari);
    waktu = totalHari + " hari";
  } else {
    let jam = Math.floor(hari * 24);
    let menit = Math.floor((hari * 24 - jam) * 60);
    let detik = Math.floor((((hari * 24 - jam) * 60) - menit) * 60);

    waktu = jam + " jam " + menit + " menit " + detik + " detik";
  }

  document.getElementById("hasil").innerText =
    "Rp " + formatAngka(uang) +
    " = " + formatAngka(ompreng) +
    " ompreng (~ " + terbilang(ompreng) + ")";

  document.getElementById("waktu").innerText =
    "Cukup untuk " + waktu;
}
</script>

</body>
</html>
